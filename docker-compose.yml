services:
  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: datashare-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Frontend (React + Vite) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datashare-frontend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Backend (NestJS) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datashare-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Database ───
  postgres:
    image: postgres:16-alpine
    container_name: datashare-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Object Storage ───
  minio:
    image: minio/minio:latest
    container_name: datashare-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datashare-net
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:

networks:
  datashare-net:
    driver: bridge
