services:
  # ─── Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: datashare-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Frontend (React + Vite) ───
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: datashare-frontend
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Backend (NestJS) ───
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: datashare-backend
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Database ───
  postgres:
    image: postgres:16-alpine
    container_name: datashare-postgres
    env_file:
      - ../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datashare -d datashare"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datashare-net
    restart: unless-stopped

  # ─── Object Storage ───
  minio:
    image: minio/minio:latest
    container_name: datashare-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # MinIO S3 API (presigned URLs)
      - "9001:9001"   # MinIO console (dev only)
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - datashare-net
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:

networks:
  datashare-net:
    driver: bridge
